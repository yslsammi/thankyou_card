<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>創意感謝卡製作器 - 香港廣東話聲效優化版</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: "Microsoft JhengHei", "Linear Sans", sans-serif;
            background-color: #f7f9fa;
            user-select: none; -webkit-user-select: none;
        }

        #app-container { display: flex; flex-direction: column; height: 100vh; }
        header {
            background-color: #ff6b6b; color: white; padding: 15px;
            text-align: center; font-size: 2rem; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #workspace { flex: 1; display: flex; overflow: hidden; }

        /* 左邊控制面板 */
        #control-panel {
            width: 40%; background: #fff; padding: 20px;
            box-sizing: border-box; overflow-y: auto;
            border-right: 5px solid #ff6b6b;
        }

        /* 右邊預覽畫布 */
        #preview-panel {
            width: 60%; display: flex; justify-content: center;
            align-items: center; background: #e9ecef; padding: 20px;
        }

        .section-title {
            font-size: 1.6rem; font-weight: bold; margin: 20px 0 10px 0;
            color: #333; border-left: 8px solid #ff6b6b; padding-left: 10px;
        }

        .option-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; }

        .big-btn {
            flex: 1; min-width: 100px; padding: 15px 10px;
            font-size: 1.3rem; font-weight: bold; text-align: center;
            background: white; border: 4px solid #ccc; border-radius: 15px;
            cursor: pointer; transition: all 0.2s;
        }

        .big-btn.selected {
            background: #ffe3e3; border-color: #ff6b6b; color: #ff6b6b;
            transform: scale(1.03); box-shadow: 0 4px 10px rgba(255,107,107,0.3);
        }

        /* 顏色圓鈕 */
        .color-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 4px solid #ccc;
            cursor: pointer; transition: transform 0.1s;
        }
        .color-btn.selected { border-color: #333; transform: scale(1.1); }

        /* 粗細拉桿樣式 */
        .slider-container { display: flex; align-items: center; gap: 15px; margin: 10px 0; }
        .weight-slider { flex: 1; height: 15px; border-radius: 10px; cursor: pointer; }

        /* --- 卡片主體與畫布組合 --- */
        #card-wrapper {
            position: relative; width: 450px; height: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-radius: 20px;
            overflow: hidden; background: white;
        }

        #card-bg {
            position: absolute; top:0; left:0; width:100%; height:100%;
            z-index: 1; transition: background 0.5s ease;
        }

        /* 畫布層 */
        #paintCanvas {
            position: absolute; top: 0; left: 0; z-index: 5;
            cursor: crosshair; touch-action: none;
        }

        /* 卡片文字層 */
        .card-text-layer {
            position: absolute; top:0; left:0; width:100%; height:100%;
            z-index: 10; pointer-events: none; 
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 40px; box-sizing: border-box;
        }

        #card-title {
            font-size: 2.5rem; font-weight: bold; text-align: center;
            color: #333; text-shadow: 2px 2px 5px rgba(255,255,255,0.9);
        }

        #card-footer {
            font-size: 2rem; font-weight: bold; text-align: center;
            color: #555; background: rgba(255,255,255,0.7);
            padding: 10px; border-radius: 10px;
        }

        /* 按鈕效果 */
        #action-btn {
            display: block; width: 100%; padding: 20px;
            background-color: #28a745; color: white;
            font-size: 1.8rem; font-weight: bold; border: none;
            border-radius: 20px; cursor: pointer; margin-top: 20px;
            box-shadow: 0 6px 0 #1e7e34;
        }
        #action-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #1e7e34; }

        #clear-btn {
            display: block; width: 100%; padding: 15px;
            background-color: #dc3545; color: white;
            font-size: 1.5rem; font-weight: bold; border: none;
            border-radius: 20px; cursor: pointer; margin-top: 15px;
            box-shadow: 0 6px 0 #bd2130;
        }
        #clear-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #bd2130; }

        #celebrate-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>🎨 自由創作！我嘅專屬感謝卡 🎨</header>
        
        <div id="workspace">
            <div id="control-panel">
                
                <div class="section-title">1. 揀送畀邊個</div>
                <div class="option-grid">
                    <button class="big-btn selected" onclick="targetSelected(this, '🌸 媽媽 🌸', '媽媽')">👩 媽媽</button>
                    <button class="big-btn" onclick="targetSelected(this, '🌟 老師 🌟', '老師')">👨‍🏫 老師</button>
                    <button class="big-btn" onclick="targetSelected(this, '❤️ 爸爸 ❤️', '爸爸')">👨 爸爸</button>
                </div>

                <div class="section-title">2. 自由生成背景 (免上傳圖片)</div>
                <div class="option-grid">
                    <button class="big-btn selected" onclick="bgGenerated(this, 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)')">🌸 初春櫻花</button>
                    <button class="big-btn" onclick="bgGenerated(this, 'linear-gradient(135deg, #ffcc33 0%, #ffb347 100%)')">🌅 晨曦暖橘</button>
                    <button class="big-btn" onclick="bgGenerated(this, 'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)')">🌌 夢幻星空</button>
                    <button class="big-btn" onclick="bgGenerated(this, 'linear-gradient(135deg, #a8ff78 0%, #78ffd6 100%)')">🍀 療癒森林</button>
                    <button class="big-btn" onclick="bgGenerated(this, '#ffffff')">⚪ 純白背景</button>
                    <button class="big-btn" onclick="bgGenerated(this, '#000000')">⚫ 純黑背景</button>
                </div>

                <div class="section-title">3. 選擇畫筆與螢光色</div>
                <div class="option-grid">
                    <button class="color-btn selected" style="background: #ff0000;" onclick="colorSelected(this, '#ff0000', false, '紅色')"></button>
                    <button class="color-btn" style="background: #0000ff;" onclick="colorSelected(this, '#0000ff', false, '藍色')"></button>
                    <button class="color-btn" style="background: #00aa00;" onclick="colorSelected(this, '#00aa00', false, '綠色')"></button>
                    <button class="color-btn" style="background: #000000;" onclick="colorSelected(this, '#000000', false, '黑色')"></button>
                    
                    <button class="color-btn" style="background: #ccff00; box-shadow: 0 0 10px #ccff00;" onclick="colorSelected(this, 'rgba(204,255,0,0.4)', true, '螢光黃色')"></button>
                    <button class="color-btn" style="background: #ff007f; box-shadow: 0 0 10px #ff007f;" onclick="colorSelected(this, 'rgba(255,0,127,0.4)', true, '螢光粉紅色')"></button>
                    <button class="color-btn" style="background: #00ffff; box-shadow: 0 0 10px #00ffff;" onclick="colorSelected(this, 'rgba(0,255,255,0.4)', true, '螢光藍色')"></button>
                </div>

                <div class="slider-container">
                    <span style="font-size: 1.2rem; font-weight: bold; color: #555;">✏️ 畫筆粗細:</span>
                    <input type="range" id="brush-weight" class="weight-slider" min="2" max="40" value="8" onchange="weightChanged(this.value)">
                    <span id="weight-display" style="font-size: 1.2rem; font-weight: bold; color: #ff6b6b;">8</span>
                </div>

                <div class="section-title">4. 選擇貼紙 (點擊後喺卡片任意位置吸印章)</div>
                <div class="option-grid">
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '❤️', '愛心')">❤️ 愛心</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '🎁', '禮物')">🎁 禮物</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '👍', '好棒')">👍 讚</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '💐', '花束')">💐 花束</button>
                </div>

                <button id="action-btn" onclick="finishCard()">🎉 製作好喇！</button>
                <button id="clear-btn" onclick="clearCanvas()">🗑️ 重畫/清除</button>
            </div>

            <div id="preview-panel">
                <div id="card-wrapper">
                    <div id="card-bg"></div>
                    <canvas id="paintCanvas" width="450" height="600"></canvas>
                    <div class="card-text-layer">
                        <div id="card-title">🌸 媽媽 🌸</div>
                        <div id="card-footer">多謝您嘅照顧！</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="celebrate-overlay" onclick="closeCelebrate()">
        <h1 style="color: gold; font-size: 3.5rem; text-align: center; margin-bottom: 20px;">🎉 卡片製作成功！ 🎉</h1>
        <p style="color: white; font-size: 1.8rem; text-align: center;">可以影相或者截圖送畀你想多謝嘅人㗎！</p>
        <button class="big-btn" style="background: #28a745; color: white; border: none; padding: 15px 40px; font-size: 1.8rem;">再做一張</button>
    </div>

    <script>
        const cardBg = document.getElementById('card-bg');
        const cardTitle = document.getElementById('card-title');
        const celebrateOverlay = document.getElementById('celebrate-overlay');
        const previewPanel = document.getElementById('preview-panel');
        const cardWrapper = document.getElementById('card-wrapper');
        
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        
        let isPainting = false;
        let currentTool = 'draw'; 
        let currentColor = '#ff0000';
        let currentSticker = '';
        let brushWeight = 8;
        let isNeon = false;
        let isSpeaking = false; // 紀錄廣東話語音係咪播緊

        // 聲音合成器設定 (Web Audio API)
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 畫畫沙沙聲效果
        function playDrawSound() {
            // 防撞聲機制：如果廣東話語音播緊，畫畫就唔出聲，廢事太嘈
            if (!audioCtx || isSpeaking) return;
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(130 + Math.random() * 60, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }

        cardBg.style.background = "linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)";

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startAction(e) {
            initAudio();
            const pos = getPos(e);
            if (currentTool === 'draw') {
                isPainting = true;
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                
                ctx.lineWidth = brushWeight;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = currentColor;

                if (isNeon) {
                    ctx.globalCompositeOperation = 'multiply';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = currentColor;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.shadowBlur = 0;
                }
            } else if (currentTool === 'sticker' && currentSticker) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.shadowBlur = 0;
                ctx.font = '50px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(currentSticker, pos.x, pos.y);
                
                // 貼貼紙時，只播廣東話，唔播沙沙聲
                speak("貼上" + currentSticker);
            }
        }

        function doAction(e) {
            if (!isPainting || currentTool !== 'draw') return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            playDrawSound();
        }

        function stopAction() { isPainting = false; }

        canvas.addEventListener('mousedown', startAction);
        canvas.addEventListener('mousemove', doAction);
        window.addEventListener('mouseup', stopAction);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); doAction(e); });
        canvas.addEventListener('touchend', stopAction);

        function targetSelected(btn, text, speakText) {
            clearSelection(btn);
            cardTitle.innerText = text;
            speak("送畀" + speakText);
        }

        function bgGenerated(btn, gradientValue) {
            clearSelection(btn);
            cardBg.style.background = gradientValue;
            if (gradientValue === '#000000') {
                cardTitle.style.color = '#ffffff';
                cardTitle.style.textShadow = '2px 2px 5px rgba(0,0,0,0.5)';
            } else {
                cardTitle.style.color = '#333333';
                cardTitle.style.textShadow = '2px 2px 5px rgba(255,255,255,0.9)';
            }
            speak("轉背景風格");
        }

        function colorSelected(btn, color, neonFlag, colorName) {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            currentColor = color;
            isNeon = neonFlag;
            currentTool = 'draw';
            speak("用" + colorName + (neonFlag ? "螢光筆" : "彩色筆"));
        }

        function weightChanged(val) {
            brushWeight = val;
            document.getElementById('weight-display').innerText = val;
        }

        function toolSelected(btn, tool, stickerEmoji = '', stickerName = '') {
            clearSelection(btn);
            currentTool = tool;
            if (tool === 'sticker') {
                currentSticker = stickerEmoji;
                speak("準備吸" + stickerName + "印章");
            }
        }

        function clearCanvas() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            speak("清除全部畫畫");
        }

        function clearSelection(currentBtn) {
            const siblings = currentBtn.parentElement.children;
            for (let sibling of siblings) { sibling.classList.remove('selected'); }
            currentBtn.classList.add('selected');
        }

        function finishCard() {
            speak("哇！張卡片好靚啊！完成喇！");
            celebrateOverlay.style.display = 'flex';
            celebrateOverlay.appendChild(cardWrapper);
        }

        function closeCelebrate() {
            celebrateOverlay.style.display = 'none';
            previewPanel.appendChild(cardWrapper);
        }

        // 獨立香港廣東話發聲系統 (防撞聲優化)
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // 㩒新掣即刻切斷舊語音
                
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'zh-HK'; // 精準設定為香港廣東話
                u.rate = 1.0;     // 正常講嘢速度
                
                // 語音開始播：標記狀態，暫停沙沙聲
                u.onstart = () => { isSpeaking = true; };
                // 語音播完：放行沙沙聲
                u.onend = () => { isSpeaking = false; };
                u.onerror = () => { isSpeaking = false; };
                
                window.speechSynthesis.speak(u);
            }
        }
    </script>
</body>
</html>
