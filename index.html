<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>創意感謝卡製作器 - iPad 自由縮放拖曳版</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: "Microsoft JhengHei", "Linear Sans", sans-serif;
            background-color: #f7f9fa;
            user-select: none; -webkit-user-select: none;
            overflow: hidden;
            position: fixed;
        }

        #app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        header {
            background-color: #ff6b6b; color: white; padding: 15px;
            text-align: center; font-size: 2rem; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        #workspace { flex: 1; display: flex; overflow: hidden; height: calc(100vh - 70px); }

        /* 左邊控制面板：20% 寬度 */
        #control-panel {
            width: 20%; background: #fff; padding: 12px;
            box-sizing: border-box; overflow-y: auto;
            border-right: 5px solid #ff6b6b;
            -webkit-overflow-scrolling: touch;
        }

        /* 右邊預覽畫布：80% 寬度，設為相對定位以放置浮動按鈕 */
        #preview-panel {
            width: 80%; display: flex; justify-content: center;
            align-items: center; background: #e9ecef; padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        .section-title {
            font-size: 1.2rem; font-weight: bold; margin: 12px 0 6px 0;
            color: #333; border-left: 5px solid #ff6b6b; padding-left: 6px;
        }

        .option-grid { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }

        .big-btn {
            flex: 1; min-width: 70px; padding: 8px 4px;
            font-size: 1rem; font-weight: bold; text-align: center;
            background: white; border: 2px solid #ccc; border-radius: 10px;
            cursor: pointer; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .big-btn.selected {
            background: #ffe3e3; border-color: #ff6b6b; color: #ff6b6b;
            transform: scale(1.02); box-shadow: 0 3px 6px rgba(255,107,107,0.2);
        }

        .color-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 2px solid #ccc;
            cursor: pointer; transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .color-btn.selected { border-color: #333; transform: scale(1.1); }

        .slider-container { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
        .weight-slider { flex: 1; height: 25px; border-radius: 15px; cursor: pointer; }

        /* --- 卡片外部容器：用來做雙指縮放跟拖曳移動 --- */
        #zoom-container {
            position: absolute;
            width: 450px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
            will-change: transform;
            touch-action: none; /* 接管所有手勢 */
        }

        /* 卡片主體 */
        #card-wrapper {
            position: relative; width: 450px; height: 600px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-radius: 20px;
            overflow: hidden; background: white;
        }

        #card-bg {
            position: absolute; top:0; left:0; width:100%; height:100%;
            z-index: 1; transition: background 0.5s ease;
        }

        #paintCanvas {
            position: absolute; top: 0; left: 0; z-index: 5;
            cursor: crosshair; 
            touch-action: none; 
        }

        .card-text-layer {
            position: absolute; top:0; left:0; width:100%; height:100%;
            z-index: 10; pointer-events: none; 
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 40px; box-sizing: border-box;
        }

        #card-title {
            font-size: 2.5rem; font-weight: bold; text-align: center;
            color: #333; text-shadow: 2px 2px 5px rgba(255,255,255,0.9);
        }

        #card-footer {
            font-size: 2rem; font-weight: bold; text-align: center;
            color: #555; background: rgba(255,255,255,0.7);
            padding: 10px; border-radius: 10px;
        }

        /* 功能按鈕 */
        #action-btn {
            display: block; width: 100%; padding: 12px;
            background-color: #28a745; color: white;
            font-size: 1.4rem; font-weight: bold; border: none;
            border-radius: 12px; cursor: pointer; margin-top: 15px;
            box-shadow: 0 4px 0 #1e7e34;
            -webkit-tap-highlight-color: transparent;
        }
        #action-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #1e7e34; }

        #clear-btn {
            display: block; width: 100%; padding: 10px;
            background-color: #dc3545; color: white;
            font-size: 1.2rem; font-weight: bold; border: none;
            border-radius: 12px; cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 0 #bd2130;
            -webkit-tap-highlight-color: transparent;
        }
        #clear-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #bd2130; }

        /* 浮動縮放控制面板（置於右下角） */
        .zoom-controls {
            position: absolute; bottom: 20px; right: 20px; z-index: 200;
            display: flex; gap: 10px; background: rgba(255,255,255,0.85);
            padding: 10px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .zoom-ctrl-btn {
            padding: 10px 15px; font-size: 1.2rem; font-weight: bold;
            background: white; border: 2px solid #ff6b6b; color: #ff6b6b;
            border-radius: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .zoom-ctrl-btn:active { background: #ffe3e3; }

        #celebrate-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>🎨 自由創作！我嘅專屬感謝卡 🎨</header>
        
        <div id="workspace">
            <div id="control-panel">
                
                <div class="section-title">1. 揀送畀邊個</div>
                <div class="option-grid">
                    <button class="big-btn selected" onclick="targetSelected(this, '🌸 媽媽 🌸', '媽媽')">👩 媽媽</button>
                    <button class="big-btn" onclick="targetSelected(this, '🌟 老師 🌟', '老師')">👨‍🏫 老師</button>
                    <button class="big-btn" onclick="targetSelected(this, '❤️ 爸爸 ❤️', '爸爸')">👨 爸爸</button>
                </div>

                <div class="section-title">2. 自由生成背景</div>
                <div class="option-grid">
                    <button class="big-btn selected" onclick="bgGenerated(this, 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)')">🌸 初春櫻花</button>
                    <button class="big-btn" onclick="bgGenerated(this, 'linear-gradient(135deg, #ffcc33 0%, #ffb347 100%)')">🌅 晨曦暖橘</button>
                    <button class="big-btn" onclick="bgGenerated(this, 'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)')">🌌 夢幻星空</button>
                    <button class="big-btn" onclick="bgGenerated(this, 'linear-gradient(135deg, #a8ff78 0%, #78ffd6 100%)')">🍀 療癒森林</button>
                    <button class="big-btn" onclick="bgGenerated(this, '#ffffff')">⚪ 純白背景</button>
                    <button class="big-btn" onclick="bgGenerated(this, '#000000')">⚫ 純黑背景</button>
                </div>

                <div class="section-title">3. 選擇畫筆與螢光色</div>
                <div class="option-grid">
                    <button class="color-btn selected" style="background: #ff0000;" onclick="colorSelected(this, '#ff0000', false, '紅色')"></button>
                    <button class="color-btn" style="background: #0000ff;" onclick="colorSelected(this, '#0000ff', false, '藍色')"></button>
                    <button class="color-btn" style="background: #00aa00;" onclick="colorSelected(this, '#00aa00', false, '綠色')"></button>
                    <button class="color-btn" style="background: #000000;" onclick="colorSelected(this, '#000000', false, '黑色')"></button>
                    
                    <button class="color-btn" style="background: #ccff00; box-shadow: 0 0 10px #ccff00;" onclick="colorSelected(this, 'rgba(204,255,0,0.4)', true, '螢光黃色')"></button>
                    <button class="color-btn" style="background: #ff007f; box-shadow: 0 0 10px #ff007f;" onclick="colorSelected(this, 'rgba(255,0,127,0.4)', true, '螢光粉紅色')"></button>
                    <button class="color-btn" style="background: #00ffff; box-shadow: 0 0 10px #00ffff;" onclick="colorSelected(this, 'rgba(0,255,255,0.4)', true, '螢光藍色')"></button>
                </div>

                <div class="slider-container">
                    <span style="font-size: 1rem; font-weight: bold; color: #555;">✏️ 粗細:</span>
                    <input type="range" id="brush-weight" class="weight-slider" min="2" max="40" value="8" onchange="weightChanged(this.value)">
                    <span id="weight-display" style="font-size: 1rem; font-weight: bold; color: #ff6b6b;">8</span>
                </div>

                <div class="section-title">4. 選擇感謝貼紙</div>
                <div class="option-grid">
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '❤️', '愛心')">❤️ 愛心</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '💖', '閃亮心')">💖 閃亮心</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '🥰', '窩心')">🥰 窩心</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '🙏', '多謝')">🙏 多謝</button>
                    
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '💐', '花束')">💐 花束</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '🎁', '禮物')">🎁 禮物</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '✉️', '心意信')">✉️ 心意信</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '🍰', '蛋糕')">🍰 蛋糕</button>
                    
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '👍', '叻叻')">👍 叻叻</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '🌟', '星星')">🌟 星星</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '🎈', '氣球')">🎈 氣球</button>
                    <button class="big-btn" onclick="toolSelected(this, 'sticker', '🎉', 'fireworks')">🎉 煙花</button>
                </div>

                <button id="action-btn" onclick="finishCard()">🎉 製作好喇！</button>
                <button id="clear-btn" onclick="clearCanvas()">🗑️ 重畫/清除</button>
            </div>

            <div id="preview-panel">
                <div id="zoom-container">
                    <div id="card-wrapper">
                        <div id="card-bg"></div>
                        <canvas id="paintCanvas" width="450" height="600"></canvas>
                        <div class="card-text-layer">
                            <div id="card-title">🌸 媽媽 🌸</div>
                            <div id="card-footer">多謝您嘅照顧！</div>
                        </div>
                    </div>
                </div>

                <div class="zoom-controls">
                    <button class="zoom-ctrl-btn" onclick="adjustZoom(0.15)">🔍 放大</button>
                    <button class="zoom-ctrl-btn" onclick="adjustZoom(-0.15)">📐 縮小</button>
                    <button class="zoom-ctrl-btn" onclick="resetZoom()">🔄 還原正中</button>
                </div>
            </div>
        </div>
    </div>

    <div id="celebrate-overlay">
        <h1 style="color: gold; font-size: 3.5rem; text-align: center; margin-bottom: 20px;">🎉 卡片製作成功！ 🎉</h1>
        <p style="color: white; font-size: 1.8rem; text-align: center;">可以影相或者截圖送畀你想多謝嘅人㗎！</p>
        <button class="big-btn" style="background: #28a745; color: white; border: none; padding: 15px 40px; font-size: 1.8rem;" onclick="closeCelebrate()">再做一張</button>
    </div>

    <script>
        const cardBg = document.getElementById('card-bg');
        const cardTitle = document.getElementById('card-title');
        const celebrateOverlay = document.getElementById('celebrate-overlay');
        const previewPanel = document.getElementById('preview-panel');
        const cardWrapper = document.getElementById('card-wrapper');
        const zoomContainer = document.getElementById('zoom-container');
        
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        
        let isPainting = false;
        let currentTool = 'draw'; 
        let currentColor = '#ff0000';
        let currentSticker = '';
        let currentStickerName = ''; 
        let brushWeight = 8;
        let isNeon = false;
        let isSpeaking = false;

        // --- 核心變數：控制卡片的縮放與位移 ---
        let scale = 1.2; // 預設 iPad 舒服的大尺寸
        let panX = 0;
        let panY = 0;
        let startTouches = [];
        let isDraggingBg = false;
        let baseScale = 1.2;

        function updateTransform() {
            zoomContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }
        updateTransform();

        // 點擊按鈕縮放與還原
        function adjustZoom(amount) {
            scale = Math.max(0.5, Math.min(3.0, scale + amount));
            updateTransform();
        }
        function resetZoom() {
            scale = 1.2;
            panX = 0;
            panY = 0;
            updateTransform();
        }

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playDrawSound() {
            if (!audioCtx || isSpeaking) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(130 + Math.random() * 60, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }

        function playFireworksSound() {
            if (!audioCtx) return;
            let now = audioCtx.currentTime;
            
            let osc1 = audioCtx.createOscillator();
            let gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(200, now);
            osc1.frequency.exponentialRampToValueAtTime(800, now + 0.15);
            gain1.gain.setValueAtTime(0.08, now);
            gain1.gain.linearRampToValueAtTime(0.001, now + 0.15);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start(now);
            osc1.stop(now + 0.15);
            
            setTimeout(() => {
                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc2.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.2);
                gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.25);
            }, 120);
        }

        cardBg.style.background = "linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)";

        // 精確換算在當前縮放 (Scale) 與位移 (Pan) 狀態下的 Canvas 繪圖坐標
        function getPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return { 
                x: (clientX - rect.left) * (canvas.width / rect.width), 
                y: (clientY - rect.top) * (canvas.height / rect.height) 
            };
        }

        // --- 處理觸控手勢事件（單指畫畫 vs 雙指縮放移動） ---
        previewPanel.addEventListener('touchstart', function(e) {
            initAudio();
            
            if (e.touches.length === 1) {
                // 單指：觸發畫畫或印章
                isDraggingBg = false;
                const pos = getPos(e.touches[0].clientX, e.touches[0].clientY);
                
                if (currentTool === 'draw') {
                    isPainting = true;
                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y);
                    ctx.lineWidth = brushWeight;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = currentColor;
                    ctx.globalCompositeOperation = isNeon ? 'multiply' : 'source-over';
                    ctx.shadowBlur = isNeon ? 10 : 0;
                    ctx.shadowColor = currentColor;
                } else if (currentTool === 'sticker' && currentSticker) {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.shadowBlur = 0;
                    ctx.font = '50px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(currentSticker, pos.x, pos.y);
                    
                    if (currentStickerName === 'fireworks') {
                        playFireworksSound();
                    } else {
                        speak(currentStickerName + "！");
                    }
                }
            } else if (e.touches.length === 2) {
                // 雙指：切換成「放大/縮小/拖曳卡片」模式，中斷單指繪畫
                isPainting = false;
                isDraggingBg = true;
                startTouches = [
                    { x: e.touches[0].clientX, y: e.touches[0].clientY },
                    { x: e.touches[1].clientX, y: e.touches[1].clientY }
                ];
                baseScale = scale;
            }
        }, { passive: false });

        previewPanel.addEventListener('touchmove', function(e) {
            if(e.cancelable) e.preventDefault();

            if (isPainting && e.touches.length === 1) {
                const pos = getPos(e.touches[0].clientX, e.touches[0].clientY);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                playDrawSound();
            } else if (isDraggingBg && e.touches.length === 2) {
                // 雙指平行移動與算縮放比例
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                
                const startDist = Math.hypot(startTouches[0].x - startTouches[1].x, startTouches[0].y - startTouches[1].y);
                const currentDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                
                // 計算新縮放
                scale = Math.max(0.5, Math.min(3.0, baseScale * (currentDist / startDist)));
                
                // 計算移動位移量
                const startCenter = { x: (startTouches[0].x + startTouches[1].x)/2, y: (startTouches[0].y + startTouches[1].y)/2 };
                const currentCenter = { x: (t1.clientX + t2.clientX)/2, y: (t1.clientY + t2.clientY)/2 };
                
                panX += currentCenter.x - startCenter.x;
                panY += currentCenter.y - startCenter.y;
                
                // 更新基準點
                startTouches = [
                    { x: t1.clientX, y: t1.clientY },
                    { x: t2.clientX, y: t2.clientY }
                ];
                updateTransform();
            }
        }, { passive: false });

        window.addEventListener('touchend', function(e) {
            if (e.touches.length === 0) {
                isPainting = false;
                isDraggingBg = false;
            } else if (e.touches.length === 1) {
                // 如果兩指變單指，依然不要畫畫，等手放開
                isDraggingBg = false;
            }
        });

        // 為了相容電腦滑鼠測試
        canvas.addEventListener('mousedown', (e) => {
            initAudio();
            isPainting = true;
            const pos = getPos(e.clientX, e.clientY);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineWidth = brushWeight;
            ctx.strokeStyle = currentColor;
        });
        canvas.addEventListener('mousemove', (e) => {
            if(!isPainting) return;
            const pos = getPos(e.clientX, e.clientY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        });
        window.addEventListener('mouseup', () => { isPainting = false; });

        function targetSelected(btn, text, speakText) {
            clearSelection(btn);
            cardTitle.innerText = text;
            speak("送畀" + speakText);
        }

        function bgGenerated(btn, gradientValue) {
            clearSelection(btn);
            cardBg.style.background = gradientValue;
            if (gradientValue === '#000000') {
                cardTitle.style.color = '#ffffff';
                cardTitle.style.textShadow = '2px 2px 5px rgba(0,0,0,0.5)';
            } else {
                cardTitle.style.color = '#333333';
                cardTitle.style.textShadow = '2px 2px 5px rgba(255,255,255,0.9)';
            }
            speak("轉背景風格");
        }

        function colorSelected(btn, color, neonFlag, colorName) {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            currentColor = color;
            isNeon = neonFlag;
            currentTool = 'draw';
            speak("用" + colorName + (neonFlag ? "螢光筆" : "彩色筆"));
        }

        function weightChanged(val) {
            brushWeight = val;
            document.getElementById('weight-display').innerText = val;
        }

        function toolSelected(btn, tool, stickerEmoji = '', stickerName = '') {
            clearSelection(btn);
            currentTool = tool;
            if (tool === 'sticker') {
                currentSticker = stickerEmoji;
                currentStickerName = stickerName;
                if(stickerName === 'fireworks') {
                    speak("準備吸煙花印章");
                } else {
                    speak("準備吸" + stickerName + "印章");
                }
            }
        }

        function clearCanvas() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            speak("清除全部畫畫");
        }

        function clearSelection(currentBtn) {
            const siblings = currentBtn.parentElement.children;
            for (let sibling of siblings) { sibling.classList.remove('selected'); }
            currentBtn.classList.add('selected');
        }

        function finishCard() {
            speak("哇！張卡片好靚啊！完成喇！");
            zoomContainer.style.transform = "none"; // 彈窗時重設，避免彈窗溢出
            celebrateOverlay.style.display = 'flex';
            celebrateOverlay.appendChild(cardWrapper);
        }

        function closeCelebrate() {
            celebrateOverlay.style.display = 'none';
            previewPanel.appendChild(zoomContainer);
            zoomContainer.appendChild(cardWrapper);
            updateTransform();
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'zh-HK';
                u.rate = 1.0;
                u.onstart = () => { isSpeaking = true; };
                u.onend = () => { isSpeaking = false; };
                u.onerror = () => { isSpeaking = false; };
                window.speechSynthesis.speak(u);
            }
        }

        // 徹底阻斷 iPad 面板以外的彈跳現象
        document.addEventListener('touchmove', function(e) {
            if (e.target.tagName !== 'DIV' || !e.target.classList.contains('option-grid')) {
                if(e.cancelable) e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
